name: MetaBCI neuro smoke

on:
  push:
    paths:
      - "services/metabci-neuro/**"
      - ".github/workflows/metabci-neuro-smoke.yml"
  pull_request:
    paths:
      - "services/metabci-neuro/**"
      - ".github/workflows/metabci-neuro-smoke.yml"

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: services/metabci-neuro

    steps:
      - uses: actions/checkout@v4

      # Heavy scientific wheels + CUDA-related PyTorch deps need free space on default runners
      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc || true
          sudo docker system prune -af || true
          df -h

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          enable-cache: true
          cache-suffix: metabci-api
          cache-dependency-glob: |
            services/metabci-neuro/requirements-api.lock.txt
            services/metabci-neuro/requirements-api.in

      - name: Sync environment (API lock — MetaBCI + Braindecode + MOABB)
        run: uv venv && uv pip install -r requirements-api.lock.txt

      - name: Smoke imports
        env:
          PI_METABCI_SMOKE_STRICT_BRAINSTIM: "0"
        run: ./.venv/bin/python scripts/smoke_imports.py
